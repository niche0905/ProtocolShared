syntax = "proto3";

package se.room;

import "common/common_types.proto";
import "common/common_enums.proto";

/*
 * Room 참가자 정보
 */
message RoomPlayer {
  se.common.PlayerId player_id = 1;
  se.common.ObjectId entity_id = 2;
  string nickname = 3;
}

/*
 * Room 초기 스냅샷
 */
message RoomSnapshot {
  uint32 room_id = 1;

  repeated RoomPlayer players = 2;
}

/*
 * Room Spawn 정보
 */
message SpawnInfo {
  se.common.ObjectType type = 1;
  se.common.ObjectId entity_id = 2;
  se.common.MovementState movement = 3;
}

/*
 * 서버 authoritative 엔티티 상태
 */
message EntityState {
  se.common.ObjectId entity_id = 1;
  se.common.MovementState movement = 2;
}
