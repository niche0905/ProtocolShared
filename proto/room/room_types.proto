syntax = "proto3";

package se.room;

import "common/common_types.proto";
import "common/common_enums.proto";

/*
 * Room 참가자 정보
 */
message RoomPlayer {
  se.common.PlayerId player_id = 1;
  se.common.ObjectId entity_id = 2;
  string nickname = 3;
}

/*
 * Room 초기 스냅샷
 */
message RoomSnapshot {
  uint32 room_id = 1;

  repeated RoomPlayer players = 2;
}

/*
 * Entity Spawn 정보
 */
message PlayerSpawnInfo {
  se.common.MovementState movement = 1;
}

message MonsterSpawnInfo {
  se.common.MovementState movement = 1;
  // TODO: 필요한 정보가 더 있다면 추가하기
}

message ItemSpawnInfo {
  se.common.Vector3 position = 1;
  se.common.Vector3 velocity = 2;
  uint32 amount = 3;
}

message ProjectileSpawnInfo {
  se.common.Vector3 position = 1;
  se.common.Vector3 velocity = 2;
}

message ChestSpawnInfo {
  se.common.Vector3 position = 1;
  float yaw = 2;
}

message StoreSpawnInfo {
  se.common.Vector3 position = 1;
  float yaw = 2;
}

/*
 * Room Spawn 정보
 */
message SpawnInfo {
  se.common.ObjectType type = 1;
  uint32 template_id = 2;
  se.common.ObjectId entity_id = 3;
  
  oneof detail {
      PlayerSpawnInfo player_info = 10;
      MonsterSpawnInfo monster_info = 11;
      ItemSpawnInfo item_info = 12;
      ProjectileSpawnInfo projectile_info = 13;
      ChestSpawnInfo chest_info = 14;
      StoreSpawnInfo store_info = 15;
  }
}
