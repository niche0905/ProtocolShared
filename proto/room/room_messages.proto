syntax = "proto3";

package se.room;

import "options/packet_options.proto";
import "common/common_enums.proto";
import "common/common_types.proto";
import "room/room_types.proto";
import "room/room_enums.proto";

/*
 * Enter
 */
message C_RoomEnterReq {
  option (se.options.packet_id) = 3000;
  option (se.options.dir) = C2S;
  option (se.options.route) = ROOM;

  uint32 room_id = 1;
}

message S_RoomEnterRes {
  option (se.options.packet_id) = 3001;
  option (se.options.dir) = S2C;
  option (se.options.route) = ROOM;

  bool success = 1;
  se.common.Result result = 2;

  RoomSnapshot snapshot = 3;
  se.common.ObjectId my_entity_id = 4; // 클라이언트가 제어하는 엔티티 ID (실패 시 0)
}

/*
 * Leave
 */
message C_RoomLeaveReq {
  option (se.options.packet_id) = 3010;
  option (se.options.dir) = C2S;
  option (se.options.route) = ROOM;
}

message S_RoomLeaveRes {
  option (se.options.packet_id) = 3011;
  option (se.options.dir) = S2C;
  option (se.options.route) = ROOM;

  bool success = 1;
  se.common.Result result = 2;
}

/*
 * Init State / Snapshot
 */
message N_EntitySpawn {
  option (se.options.packet_id) = 3100;
  option (se.options.dir) = S2C;
  option (se.options.route) = ROOM;

  SpawnInfo info = 1;
}

message N_EntityDespawn {
  option (se.options.packet_id) = 3101;
  option (se.options.dir) = S2C;
  option (se.options.route) = ROOM;

  se.common.ObjectId entity_id = 1;
}

/*
 * Room Shutdown
 */
message N_RoomClosed {
  option (se.options.packet_id) = 3200;
  option (se.options.dir) = S2C;
  option (se.options.route) = ROOM;

  uint32 room_id = 1;
  RoomClosedReason reason = 2;
}
