syntax = "proto3";

package se.game;

import "common/common_types.proto";
import "common/common_enums.proto";
import "game/game_enums.proto";

message PlayerMovement {
  float aim_yaw = 1;
  float pitch = 2;
  se.common.Vector2 velocity = 3;
  int32 movement_mode = 4;
}

message MonsterMovement {
  // TODO: Monster 고유 이동 상태 추가
}

message ProjectileMovement {
  se.common.Vector3 velocity = 1;
}

message WeaponStatSnapshot {
  int32 mag_capacity = 1;
  float fire_interval = 2;
  float reload_time = 3;
  
  int32 pellet_count = 4;
  float cone_angle = 5;
  
  float projectile_speed = 6;
  float explosion_radius = 7;
}

message WeaponSlotSnapshot {
  uint32 weapon_id = 1;
  WeaponStatSnapshot stat = 2;
}

message WeaponStatValue {
  WeaponStatType stat_type = 1;
  
  oneof value {
    int32 int_value = 2;
    float float_value = 3;
  }
}

message ItemStack {
  uint32 item_id = 1;
  uint32 amount = 2;
}
