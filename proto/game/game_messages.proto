syntax = "proto3";

package se.game;

import "options/packet_options.proto";
import "common/common_types.proto";
import "common/common_enums.proto";
import "game/game_enums.proto";
import "game/game_types.proto";

/*
 * Game flow
 */
message C_LoadingCompleteReq {
  option (se.options.packet_id) = 4000;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
}

message N_GameStart {
  option (se.options.packet_id) = 4001;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
}

message N_GameEnd {
  option (se.options.packet_id) = 4002;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
}

message N_PlayerInitSetup {
  option (se.options.packet_id) = 4003;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  int32 max_health = 1;       // 플레이어의 최대 체력
  int32 current_health = 2;   // 플레이어의 현재 체력
  int32 time_points = 3;      // 플레이어의 시간 포인트
  
  repeated WeaponSlotSnapshot weapon_slots = 4;   // 플레이어가 가진 무기 슬롯들의 초기 상태 (무기 ID, 탄약 수 등)
}

/*
 * Movement
 */
message C_MoveReq {
  option (se.options.packet_id) = 4010;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.MovementState movement = 1;
}

message N_Move {
  option (se.options.packet_id) = 4011;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;
  se.common.ObjectType object_type = 2;   // Entity의 타입 (플레이어, NPC 등)을 식별할 수 있는 ID
  
  se.common.Transform transform = 3;   // 현재 위치와 회전 정보
  
  oneof detail {
    se.game.PlayerMovement player_movement = 4;   // 플레이어의 이동에 대한 추가 정보 (예: 달리기, 걷기, 슬라이딩 등)
    se.game.MonsterMovement monster_movement = 5;   // 몬스터의 이동에 대한 추가 정보 (예: 패트롤, 추적, 도망 등)
    se.game.ProjectileMovement projectile_movement = 6;   // 투사체의 이동에 대한 추가 정보 (예: 발사된 총알, 날아가는 수류탄 등)
  }
}

message C_JumpReq {
  option (se.options.packet_id) = 4020;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
}

message N_Jump {
  option (se.options.packet_id) = 4021;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
}

message C_DoubleJumpReq {
  option (se.options.packet_id) = 4022;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
}

message N_DoubleJump {
  option (se.options.packet_id) = 4023;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
}

message C_JumpLand{
  option (se.options.packet_id) = 4024;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
}

message N_JumpLand {
  option (se.options.packet_id) = 4025;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
}

message C_CrouchReq {
  option (se.options.packet_id) = 4030;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  bool is_crouching = 1;   // true: 앉기 시작, false: 일어서기 시작
}

message N_Crouch {
  option (se.options.packet_id) = 4031;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  bool is_crouching = 2;   // true: 앉음, false: 일어남
}

message C_WireLaunchReq {
  option (se.options.packet_id) = 4040;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;

  se.common.Vector3 start_position = 1;
  se.common.Vector3 direction = 2;
}

message N_WireLaunch {
  option (se.options.packet_id) = 4041;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;
  se.common.Vector3 start_position = 2;
  se.common.Vector3 direction = 3;
}

message C_WireActionReq {
  option (se.options.packet_id) = 4042;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.Vector3 anchor_point = 1;   // 와이어 액션이 시작되는 지점 (플레이어 위치)
}

message N_WireAction {
  option (se.options.packet_id) = 4043;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;
  se.common.Vector3 anchor_point = 2;   // 와이어 액션이 시작되는 지점 (플레이어 위치)
}

message C_WireActionEnd {
  option (se.options.packet_id) = 4044;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
}

message N_WireActionEnd {
  option (se.options.packet_id) = 4045;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;
}

/*
 * Combat
 */

message C_AimReq {
  option (se.options.packet_id) = 4090;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  bool is_aiming = 1;   // true: 조준 시작, false: 조준 해제
}

message N_Aim {
  option (se.options.packet_id) = 4091;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  bool is_aiming = 2;   // true: 조준 중, false: 비조준
}

message C_FireReq {
  option (se.options.packet_id) = 4100;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  uint32 weapon_id = 1;   // 어떤 무기로 발사하는지 식별할 수 있는 ID
  se.common.Vector3 start_position = 2;
  se.common.Vector3 direction = 3;
  uint32 shot_seed = 4;   // 총알 궤적의 랜덤성을 보장하기 위한 시드값 (클라이언트에서 생성되고 패킷에 포함)
}

message N_Fire {
  option (se.options.packet_id) = 4101;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 weapon_id = 2;
  se.common.Vector3 start_position = 3;
  se.common.Vector3 direction = 4;
  uint32 shot_seed = 5;
}

message N_Attack {
  option (se.options.packet_id) = 4103;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 attack_type = 2;   // 어떤 공격인지 식별할 수 있는 ID
  // TODO: NPC BT가 구성되면 이 패킷 리뉴얼 필요할 듯 함
}

message C_ThrowGrenadeReq {
  option (se.options.packet_id) = 4104;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  uint32 grenade_type = 1;   // 어떤 수류탄을 던지는지 식별할 수 있는 ID
  se.common.Vector3 start_position = 2;
  se.common.Vector3 direction = 3;
}

message N_ThrowGrenade {
  option (se.options.packet_id) = 4105;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 grenade_type = 2;
  se.common.Vector3 start_position = 3;
  se.common.Vector3 direction = 4;
}

message C_ReloadReq {
  option (se.options.packet_id) = 4106;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  uint32 weapon_id = 1;   // 어떤 무기를 재장전하는지 식별할 수 있는 ID 
}

message S_ReloadRes {
  option (se.options.packet_id) = 4107;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  bool success = 1;   // 재장전 성공 여부
  uint32 weapon_id = 2;   // 어떤 무기를 재장전하는지 식별할 수 있는 ID (성공한 경우)
  uint32 reloaded_ammo = 3;   // 재장전된 탄약 수 (성공한 경우)
  uint32 remaining_ammo = 4;   // 재장전 후 남은 탄약 수 (성공한 경우)
}

message N_Reload {
  option (se.options.packet_id) = 4108;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 weapon_id = 2;
}

message C_WeaponChangeReq {
  option (se.options.packet_id) = 4109;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  uint32 weapon_id = 1;   // 어떤 무기로 변경하는지 식별할 수 있는 ID
}

message N_WeaponChanged {
  option (se.options.packet_id) = 4110;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 weapon_id = 2;
}

message N_WeaponStatChanged {
  option (se.options.packet_id) = 4115;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  uint32 weapon_id = 1;   // 어떤 무기의 스탯이 변경되었는지 식별할 수 있는 ID
  repeated WeaponStatValue stats = 2;   // 변경된 스탯과 그 값들의 리스트 (예: 데미지, 사거리, 발사 속도 등)
}

message N_WeaponStatSnapshot {
  // 이 패킷이 오면 무조건 이 패킷으로 Set 하도록 (유효한 값으로 서버에서 보장)
  option (se.options.packet_id) = 4116;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  repeated WeaponSlotSnapshot stats = 2;   // 무기의 스탯과 그 값들의 리스트 (예: 데미지, 사거리, 발사 속도 등)
}

message C_UseAbilityReq {
  option (se.options.packet_id) = 4120;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  uint32 ability_id = 1;   // 어떤 능력을 사용하는지 식별할 수 있는 ID
}

message N_UseAbility {
  option (se.options.packet_id) = 4121;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;
  uint32 ability_id = 2;
  // 능력 사용에 필요한 추가 정보 (예: 타겟 위치, 타겟 엔티티 등)를 여기에 포함할 수 있음
}

message N_EntityHit {
  option (se.options.packet_id) = 4150;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;     // 맞은 엔티티의 ID
  se.common.Vector3 hit_position = 2;   // 맞은 위치 (근사 하여 Entity의 콜리전 박스 내에서 표현)
  uint32 damage = 3;                    // 충격량 (이펙트에 사용 가능, ex 피튀김 정도)
}

message N_KillPlayer {  // 이펙트를 보여주기 위한 패킷
  option (se.options.packet_id) = 4190;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId killer_id = 1;   // 킬을 한 플레이어의 ID
  se.common.ObjectId victim_id = 2;   // 죽은 플레이어의 ID
}

/*
 * Items / Interactions
 */
message C_UseItemReq {
  option (se.options.packet_id) = 4200;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;

  uint32 item_id = 1;   // 어떤 아이템을 사용하는지 식별할 수 있는 ID
}

message S_UseItemRes {
  option (se.options.packet_id) = 4201;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  bool success = 1;               // 아이템 사용 가능 여부
  se.common.Result result = 2;    // 아이템 사용 시도 실패 시 실패 이유
  uint32 item_id = 3;             // 어떤 아이템이 사용되고 있는지 식별할 수 있는 ID
}

message N_UseItem {
  option (se.options.packet_id) = 4202;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 아이템을 사용하는 플레이어의 ID
  uint32 item_id = 2;   // 어떤 아이템이 사용되었는지 식별할 수 있는 ID
}

message C_ChestInteractReq {
  option (se.options.packet_id) = 4210;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.ObjectId chest_entity_id = 1;   // 상호작용을 하려는 entity의 ID (상자)
}

message N_ChestInteracted {
  option (se.options.packet_id) = 4211;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 상자를 연 플레이어의 ID
  se.common.ObjectId chest_entity_id = 2;   // 상호작용한 상자의 entity ID
}

message C_PickupItemReq {
  option (se.options.packet_id) = 4220;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.ObjectId item_entity_id = 1;   // 상호작용을 하려는 entity의 ID (아이템)
}

message N_PickupItem {
  option (se.options.packet_id) = 4221;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 아이템을 주운 플레이어의 ID
  se.common.ObjectId item_entity_id = 2;   // 주운 아이템의 entity ID
}

message C_EquipItemReq {
  option (se.options.packet_id) = 4230;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;

  uint32 item_id = 1;   // 어떤 아이템을 장착하는지 식별할 수 있는 ID (수류탄과 같은 장착 모션이 필요한 아이템을 위한 패킷)
}

message S_EquipItemRes {
  // 해당 아이템이 없는 경우 너는 착용할 수 없다 (혹은 사망 상태이거나)
  option (se.options.packet_id) = 4231;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  bool success = 1;   // 아이템 장착 성공 여부
  se.common.Result result = 2;   // 아이템 장착 실패 시 실패 이유
  uint32 item_id = 3;   // 어떤 아이템이 장착되었는지 식별할 수 있는 ID (성공한 경우)
}

message N_EquipItem {
  option (se.options.packet_id) = 4232;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  se.common.ObjectId entity_id = 1;   // 아이템을 장착하는 플레이어의 ID
  uint32 item_id = 2;   // 어떤 아이템이 장착되었는지 식별할 수 있는 ID
}

message C_UseStoreReq {
  option (se.options.packet_id) = 4240;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.ObjectId store_entity_id = 1;   // 상호작용을 하려는 entity의 ID (상점)
  uint32 store_item_id = 2;   // 상점에서 어떤 슬롯을 구매하려는지 식별할 수 있는 ID
}

message S_UseStoreRes {
  option (se.options.packet_id) = 4241;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  bool success = 1;   // 구매 성공 여부
  se.common.Result result = 2;   // 구매 실패 시 실패 이유
  uint32 store_item_id = 3;   // 상점에서 어떤 슬롯이 구매되었는지 식별할 수 있는 ID
}

message N_ItemGained {
  option (se.options.packet_id) = 4250;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  uint32 item_id = 1;   // 어떤 아이템이 획득되었는지 식별할 수 있는 ID
  uint32 new_quantity = 2;    // 얻은 후 현재 아이템의 수량 (1 이상)
  uint32 quantity = 3;   // 획득한 아이템의 수량
}

message N_ItemLost {    // or Use
  option (se.options.packet_id) = 4251;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  uint32 item_id = 1;         // 어떤 아이템이 잃었는지 식별할 수 있는 ID
  uint32 new_quantity = 2;    // 잃은 후 남은 아이템의 수량 (0이면 완전히 잃은 것)
  uint32 quantity = 3;        // 잃은 아이템의 수량
}

message N_ItemSnapshot {
  // 이 패킷이 오면 무조건 이 패킷으로 Set 하도록 (유효한 값으로 서버에서 보장)
  option (se.options.packet_id) = 4252;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  repeated ItemStack items = 1;   // 현재 플레이어가 가진 아이템들의 리스트 (아이템 ID와 수량)
}

message C_SetSavePointReq {
  option (se.options.packet_id) = 4290;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;
  
  se.common.Vector3 position = 1;   // 세이브 포인트로 설정할 위치
  // 필요에 따라 회전 정보도 포함할 수 있음
  // 쿨타임이 필요하다면 Res 패킷도 구현
}

message S_SetSavePointRes {
  option (se.options.packet_id) = 4291;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  bool success = 1;   // 세이브 포인트 설정 성공 여부
  se.common.Result result = 2;   // 세이브 포인트 설정 실패 시 실패 이유
  se.common.Vector3 position = 3;   // 세이브 포인트로 설정된 위치 (성공한 경우)
}

/*
 * State updates
 */

message N_HealthChanged {
  option (se.options.packet_id) = 4300;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 체력이 변경된 엔티티의 ID
  int32 new_health = 2;   // 변경된 체력 값
  int32 delta = 3;   // 체력 변화량 (예: -20, +10)
}

message N_MaxHealthChanged {
  option (se.options.packet_id) = 4301;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 최대 체력이 변경된 엔티티의 ID
  int32 new_max_health = 2;           // 변경된 최대 체력 값
  int32 new_current_health = 3;       // 최대 체력 변경 후 현재 체력 값 (최대 체력보다 클 수 없음)
}

message N_HealthSnapshot {
  // 이 패킷이 오면 무조건 이 패킷으로 Set 하도록 (유효한 값으로 서버에서 보장)
  option (se.options.packet_id) = 4302;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  int32 current_health = 1;   // 현재 체력 값
  int32 max_health = 2;       // 최대 체력 값
}

message N_TimePointChanged {
  option (se.options.packet_id) = 4310;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  int32 new_time_points = 1;   // 변경된 시간 포인트 값
  int32 delta = 2;   // 시간 포인트 변화량 (예: -20, +10)
}

message N_TimePointSnapshot {
  // 이 패킷이 오면 무조건 이 패킷으로 Set 하도록 (유효한 값으로 서버에서 보장)
  option (se.options.packet_id) = 4311;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  int32 time_points = 1;   // 현재 시간 포인트 값
}

message N_SkillUnlock {
  option (se.options.packet_id) = 4320;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  uint32 skill_id = 1;   // 어떤 스킬이 잠금 해제되었는지 식별할 수 있는 ID
}

message C_SkillEquipReq {
  option (se.options.packet_id) = 4321;
  option (se.options.dir) = C2S;
  option (se.options.route) = GAME;

  uint32 skill_id = 1;   // 어떤 스킬을 장착하는지 식별할 수 있는 ID
  uint32 slot_index = 2;   // 어떤 슬롯에 장착하는지 식별할 수 있는 ID
}

message S_SkillEquipRes {
  option (se.options.packet_id) = 4322;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  bool success = 1;   // 스킬 장착 성공 여부
  se.common.Result result = 2;   // 스킬 장착 실패 시 실패 이유
  uint32 skill_id = 3;   // 어떤 스킬이 장착되었는지 식별할 수 있는 ID (성공한 경우)
  uint32 slot_index = 4;   // 어떤 슬롯에 장착되었는지 식별할 수 있는 ID (성공한 경우)
}

message N_SkillUnlockSnapshot {
  // 이 패킷이 오면 무조건 이 패킷으로 Set 하도록 (유효한 값으로 서버에서 보장)
  option (se.options.packet_id) = 4323;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;

  repeated uint32 unlocked_skill_ids = 1;   // 현재 잠금 해제된 스킬들의 ID 리스트
}

message N_EntityDied {
  option (se.options.packet_id) = 4390;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 죽은 엔티티의 ID
}

message N_EntityRespawned {
  option (se.options.packet_id) = 4391;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 리스폰한 엔티티의 ID
  se.common.Transform transform = 2;   // 리스폰 위치와 회전 정보
}

message N_EntityDestroyed {
  option (se.options.packet_id) = 4392;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.ObjectId entity_id = 1;   // 파괴된 엔티티의 ID
}

/*
 * World updates
 */
message N_TimeStormChange {
  option (se.options.packet_id) = 4400;
  option (se.options.dir) = S2C;
  option (se.options.route) = GAME;
  
  se.common.Vector3 center = 1;   // 타임 스톰의 중심 위치
  float radius = 2;               // 타임 스톰의 반지름
  float waiting_time = 3;         // 타임 스톰이 다음 단계로 변화하기까지 남은 시간 (초 단위)
  float shrinking_time = 4;       // 타임 스톰이 수축하는 데 걸리는 시간 (초 단위)
}
