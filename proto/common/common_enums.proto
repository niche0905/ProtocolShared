syntax = "proto3";

package se.common;

/*
 * 모든 응답 패킷에서 공용으로 사용하는 에러 코드
 * 값은 절대 재사용 금지
 */
enum ErrorCode {
  ERR_NONE = 0;

  // Common
  ERR_UNKNOWN = 1;
  ERR_INVALID_PACKET = 2;
  ERR_INVALID_STATE = 3;
  ERR_PERMISSION_DENIED = 4;

  // Auth
  ERR_AUTH_FAILED = 100;
  ERR_ALREADY_LOGGED_IN = 101;

  // Lobby
  ERR_INVALID_LOBBY = 200;

  // Room
  ERR_INVALID_ROOM = 300;
  ERR_ROOM_FULL = 301;
}

enum ObjectType {
  OBJ_NONE = 0;
  
  OBJ_PLAYER = 1;
  OBJ_NPC = 2;
  OBJ_ITEM = 3;
}
