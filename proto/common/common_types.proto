syntax = "proto3";

package se.common;

import "common/common_enums.proto";

/*
 * 공용 결과 타입
 * 모든 Res* 패킷에 포함되는 것을 권장
 */
message Result {
  ErrorCode code = 1;
  string message = 2;
}

/*
 * 3D 벡터
 * 좌표계는 서버 기준(right-handed / left-handed 여부는 문서로 고정)
 */
message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

/*
 * 위치 + 회전 (정적 상태)
 * 순간 스냅샷, 텔레포트, 초기 동기화 등에 사용
 */
message Transform {
  Vector3 position = 1;
  float yaw = 2;
}

/*
 * 이동 동기화용 최소 상태
 * 서버 -> 클라이언트 브로드캐스트 기준
 */
// TODO: Wire Action과 다른 Animation State를 포함해야 한다
message MovementState {
  Vector3 position = 1;
  float yaw = 2;
  float pitch = 3;
  float speed = 4; // 이동 속도 (0이면 정지)
}

/*
 * Player 식별용 ID
 * 64비트 정수로 충분히 넉넉하게 할당 가능
 * DB ID
 */
message PlayerId {
  uint64 value = 1;
}

/*
 * 엔티티 식별용 공용 ID
 * Player / NPC / Object 공통
 */
message ObjectId {
  uint32 value = 1;
}
